files:
  post:
    security:
    - bearerAuth: []
    tags:
    - files
    operationId: create_file
    summary: Загружает файл
    requestBody:
      content:
        multipart/form-data:
          schema:
            additionalProperties: false
            type: object
            required:
            - file
            properties:
              file:
                type: string
                format: binary
                nullable: false
                minLength: 1
    responses:
      '201':
        $ref: '#/components/responses/File'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    security:
    - bearerAuth: []
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/id
    tags:
    - files
    operationId: read_files
    summary: Возвращает список файлов
    responses:
      '200':
        $ref: '#/components/responses/FilesList'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - files
    operationId: delete_file
    summary: Удаляет файл
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
files-download:
  parameters:
  - $ref: '#/components/parameters/file_id'
  get:
    security:
    - bearerAuth: []
    tags:
    - files
    operationId: download_file
    summary: Скачивание файла
    responses:
      '200':
        description: OK
        content:
          '*/*':
            schema:
              type: string
              format: binary
      default:
        $ref: openapi.yaml#/components/responses/CommonError
components:
  schemas:
    FILE_NAME:
      type: string
      example: image.png
      description: Имя файла.
    FILE_LENGTH:
      type: integer
      example: 1024
      description: Размер файла в байтах.
    FILE_MIME_TYPE:
      type: string
      example: image/png
      description: MIME type.
    FILE_URL:
      type: string
      example: uri
      description: URL по которому доступен файл.
    File:
      additionalProperties: false
      type: object
      required:
      - id
      - name
      - length
      - mime_type
      - file_url
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: '#/components/schemas/FILE_NAME'
        length:
          $ref: '#/components/schemas/FILE_LENGTH'
        mime_type:
          $ref: '#/components/schemas/FILE_MIME_TYPE'
        file_url:
          $ref: '#/components/schemas/FILE_URL'
  responses:
    File:
      description: Файлы.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/File'
    FilesList:
      description: Список файлов.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/File'
  parameters:
    file_id:
      name: file_id
      in: path
      required: true
      description: id файла.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
