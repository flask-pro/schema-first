directories-legal-act-type:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_legal_act_type
    summary: Создание типа документа
    requestBody:
      $ref: '#/components/requestBodies/NewLegalActTypeRequest'
    responses:
      '201':
        $ref: '#/components/responses/LegalActTypeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    - $ref: parameters.openapi.yaml#/components/parameters/eq__name
    tags:
    - directories
    operationId: read_legal_act_types
    summary: Возвращает список типов документов.
    description: Поддерживает пагинацию.
    responses:
      '200':
        $ref: '#/components/responses/LegalActTypesResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_legal_act_type
    summary: Обновляет тип документа
    requestBody:
      $ref: '#/components/requestBodies/UpdateLegalActTypeRequest'
    responses:
      '200':
        $ref: '#/components/responses/LegalActTypeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_legal_act_type
    summary: Удаляет тип документа
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewLegalActType:
      type: object
      additionalProperties: false
      required:
      - name
      - short_name
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    UpdateLegalActType:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
    LegalActType:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - short_name
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
  responses:
    LegalActTypeResponse:
      description: Тип документа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/LegalActType'
    LegalActTypesResponse:
      description: Список типов документов.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/LegalActType'
  requestBodies:
    NewLegalActTypeRequest:
      description: Создание нового типа документа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewLegalActType'
    UpdateLegalActTypeRequest:
      description: Изменение существующего типа документа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateLegalActType'
