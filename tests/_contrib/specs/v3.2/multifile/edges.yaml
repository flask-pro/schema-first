edges:
  post:
    security:
    - bearerAuth: []
    tags:
    - graph
    operationId: create_edge
    summary: Создание ребра
    requestBody:
      $ref: '#/components/requestBodies/NewEdgeRequest'
    responses:
      '201':
        $ref: '#/components/responses/EdgeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    - $ref: parameters.openapi.yaml#/components/parameters/eq__name
    tags:
    - graph
    operationId: read_edges
    summary: Возвращает список рёбер.
    description: Поддерживает пагинацию.
    responses:
      '200':
        $ref: '#/components/responses/EdgesResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - graph
    operationId: update_edge
    summary: Редактирует ребро
    requestBody:
      $ref: '#/components/requestBodies/UpdateEdgeRequest'
    responses:
      '200':
        $ref: '#/components/responses/EdgeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - graph
    operationId: delete_edge
    summary: Удаляет ребро
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewEdge:
      type: object
      additionalProperties: false
      required:
      - start_vertex_id
      - edge_type_id
      - end_vertex_id
      properties:
        start_vertex_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        edge_type_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        end_vertex_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
    UpdateEdge:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        start_vertex_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        edge_type_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        end_vertex_id:
          $ref: fields.openapi.yaml#/components/schemas/ID
    Edge:
      type: object
      additionalProperties: false
      required:
      - start_vertex
      - edge_type
      - end_vertex
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        start_vertex:
          $ref: legal-acts.openapi.yaml#/components/schemas/LegalAct
        edge_type:
          $ref: edge-types.yaml#/components/schemas/EdgeType
        end_vertex:
          $ref: legal-acts.openapi.yaml#/components/schemas/LegalAct
  responses:
    EdgeResponse:
      description: Тип документа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Edge'
    EdgesResponse:
      description: Список рёбер.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Edge'
  requestBodies:
    NewEdgeRequest:
      description: Запрос создания нового ребра.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewEdge'
    UpdateEdgeRequest:
      description: Запрос изменения существующего ребра.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateEdge'
