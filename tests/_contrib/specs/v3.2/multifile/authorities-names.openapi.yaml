directories-authorities-names:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_authority_name
    summary: Создание наименования учреждения
    requestBody:
      $ref: '#/components/requestBodies/NewAuthorityNameRequest'
    responses:
      '201':
        $ref: '#/components/responses/AuthorityNameResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    - $ref: parameters.openapi.yaml#/components/parameters/eq__name
    tags:
    - directories
    operationId: read_authorities_names
    summary: Возвращает список наименований учреждений.
    description: Поддерживает пагинацию.
    responses:
      '200':
        $ref: '#/components/responses/AuthoritiesNamesResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_authority_name
    summary: Обновляет наименование учреждения
    requestBody:
      $ref: '#/components/requestBodies/UpdateAuthorityNameRequest'
    responses:
      '200':
        $ref: '#/components/responses/AuthorityNameResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_authority_name
    summary: Удаляет наименование учреждения
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewAuthorityName:
      type: object
      additionalProperties: false
      required:
      - name
      - genitive_name
      - short_name
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    UpdateAuthorityName:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    AuthorityName:
      type: object
      additionalProperties: false
      required:
      - id
      - name
      - genitive_name
      - short_name
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/VALUE
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
  responses:
    AuthorityNameResponse:
      description: Наименование учреждения.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AuthorityName'
    AuthoritiesNamesResponse:
      description: Список наименований учреждений.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/AuthorityName'
  requestBodies:
    NewAuthorityNameRequest:
      description: Создание нового наименования учреждения.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewAuthorityName'
    UpdateAuthorityNameRequest:
      description: Изменение существующего наименования учреждения.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdateAuthorityName'
