territories:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_territory
    summary: Создаёт территорию
    requestBody:
      $ref: '#/components/requestBodies/RequestCreateTerritory'
    responses:
      '201':
        $ref: '#/components/responses/ResponseTerritory'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    tags:
    - directories
    operationId: read_territories
    summary: Возвращает список территорий
    responses:
      '200':
        $ref: '#/components/responses/Territories'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_territory
    summary: Редактирование территории
    requestBody:
      $ref: '#/components/requestBodies/RequestUpdateTerritory'
    responses:
      '200':
        $ref: '#/components/responses/ResponseTerritory'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_territory
    summary: Удаляет территорию.
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    ADMINISTRATIVE_UNIT_ID:
      type: string
      format: uuid
      nullable: false
      example: 789d995f-3aa0-4bf8-a77b-2f2f20868503
      description: ID территориально-административной единицы.
    PARENT_ID:
      type: string
      format: uuid
      example: 789d995f-3aa0-4bf8-a77b-2f2f20868503
      description: ID родительского узла.
    UPDATABLE_PARENT_ID:
      type: string
      format: uuid
      nullable: true
      example: 789d995f-3aa0-4bf8-a77b-2f2f20868503
      description: ID родительского узла.
    NewTerritory:
      type: object
      additionalProperties: false
      required:
      - name
      - administrative_unit_id
      - genitive_name
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
        administrative_unit_id:
          $ref: '#/components/schemas/ADMINISTRATIVE_UNIT_ID'
        parent_id:
          $ref: '#/components/schemas/PARENT_ID'
    ChildrenTerritory:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        full_name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
        full_genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        administrative_unit:
          $ref: adm-units.openapi.yaml#/components/schemas/AdmUnit
    Territory:
      type: object
      additionalProperties: false
      required: [id]
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        full_name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
        full_genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        administrative_unit:
          $ref: adm-units.openapi.yaml#/components/schemas/AdmUnit
        children:
          type: array
          description: Потомки узла.
          items:
            $ref: '#/components/schemas/ChildrenTerritory'
    UpdatedTerritory:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
        administrative_unit_id:
          $ref: '#/components/schemas/ADMINISTRATIVE_UNIT_ID'
        parent_id:
          $ref: '#/components/schemas/UPDATABLE_PARENT_ID'
  responses:
    ResponseTerritory:
      description: Схема ответа содержащая данные территории.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Territory'
    Territories:
      description: Список регионов.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Territory'
  requestBodies:
    RequestCreateTerritory:
      description: Запрос создания новой территории.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewTerritory'
    RequestUpdateTerritory:
      description: Запрос изменения территории.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatedTerritory'
