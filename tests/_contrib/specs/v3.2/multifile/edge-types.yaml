edge-types:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_edge_type
    summary: Создаёт тип ребра графа
    requestBody:
      $ref: '#/components/requestBodies/RequestCreateEdgeType'
    responses:
      '201':
        $ref: '#/components/responses/ResponseEdgeType'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    - $ref: parameters.openapi.yaml#/components/parameters/eq__name
    tags:
    - directories
    operationId: read_edge_types
    summary: Возвращает список типов рёбер графа
    responses:
      '200':
        $ref: '#/components/responses/EdgeTypes'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_edge_type
    summary: Редактирование типа ребра графа
    requestBody:
      $ref: '#/components/requestBodies/RequestUpdateEdgeType'
    responses:
      '200':
        $ref: '#/components/responses/ResponseEdgeType'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_edge_type
    summary: Удаляет тип ребра графа.
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewEdgeType:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
    EdgeType:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
    UpdatedEdgeType:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
  responses:
    ResponseEdgeType:
      description: Схема ответа содержащая данные типа ребра графа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EdgeType'
    EdgeTypes:
      description: Список типов рёбер графа.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/EdgeType'
  requestBodies:
    RequestCreateEdgeType:
      description: Запрос создания нового типа ребра графа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewEdgeType'
    RequestUpdateEdgeType:
      description: Запрос изменения типа ребра графа.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatedEdgeType'
