adm-units:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_adm_unit
    summary: Создаёт тип территориально-административной единицы
    requestBody:
      $ref: '#/components/requestBodies/RequestCreateAdmUnit'
    responses:
      '201':
        $ref: '#/components/responses/ResponseAdmUnit'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/id
    - $ref: parameters.openapi.yaml#/components/parameters/name
    tags:
    - directories
    operationId: read_adm_units
    summary: Возвращает список типов территориально-административных единиц
    responses:
      '200':
        $ref: '#/components/responses/AdmUnits'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_adm_unit
    summary: Редактирование типа территориально-административной единицы
    requestBody:
      $ref: '#/components/requestBodies/RequestUpdateAdmUnit'
    responses:
      '200':
        $ref: '#/components/responses/ResponseAdmUnit'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_adm_unit
    summary: Удаляет тип территориально-административной единицы.
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewAdmUnit:
      type: object
      additionalProperties: false
      required: [name, genitive_name, short_name]
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    AdmUnit:
      type: object
      additionalProperties: false
      required: [id, genitive_name, short_name]
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    UpdatedAdmUnit:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
  responses:
    ResponseAdmUnit:
      description: Схема ответа содержащая данные типа территориально-административной единицы.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AdmUnit'
    AdmUnits:
      description: Список типов территориально-административных единиц.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/AdmUnit'
  requestBodies:
    RequestCreateAdmUnit:
      description: Запрос создания нового типа территориально-административной единицы.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewAdmUnit'
    RequestUpdateAdmUnit:
      description: Запрос изменения типа территориально-административной единицы.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatedAdmUnit'
