components:
  parameters:
    include_metadata:
      in: query
      name: include_metadata
      description: Include metadata object to response
      schema:
        type: string
        enum:
        - enable
    page:
      in: query
      name: page
      description: Page number
      schema:
        type: integer
        nullable: false
        minimum: 1
        example: 1
    per_page:
      in: query
      name: per_page
      description: Number of records per page
      schema:
        type: integer
        example: 30
        minimum: 1
        maximum: 50000
    id:
      name: id
      in: query
      description: id объекта.
      deprecated: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/MULTIPLE_ID
    eq__id:
      name: eq__id
      in: query
      description: id объекта.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    in__id:
      name: in__id
      in: query
      description: Идентификаторы объектов.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/MULTIPLE_ID
    fields:
      name: fields
      in: query
      description: Список возвращаемых полей.
      schema:
        type: array
        nullable: false
        items:
          type: string
          enum: []
    search:
      name: search
      in: query
      description: Регистронезависимый поиск по подстроке.
      schema:
        type: string
        nullable: false
        minLength: 3
        maxLength: 200
    contain__title:
      name: contain__title
      in: query
      description: Регистронезависимый поиск по подстроке.
      schema:
        type: string
        nullable: false
        minLength: 3
        maxLength: 200
    q:
      name: q
      in: query
      description: Полнотекстовый поиск.
      schema:
        type: string
        nullable: false
        minLength: 3
        maxLength: 300
    sort__signature_date:
      name: sort__signature_date
      in: query
      description: Сортировка по дате подписания документа.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/SORT
    sort_signature_date:
      name: sort_signature_date
      in: query
      description: Сортировка по дате подписания документа.
      deprecated: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/SORT
    start_date_of_day:
      name: start_date_of_day
      in: query
      description: Начальное значение диапазона фильтрации документов по дате подписания.
      required: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/DATE
    end_date_of_day:
      name: end_date_of_day
      in: query
      description: Конечное значение диапазона фильтрации документов по дате подписания.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/DATE
    ge__signature_date:
      name: ge__signature_date
      in: query
      description: Начальное значение диапазона фильтрации документов по дате подписания.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/DATE
    le__signature_date:
      name: le__signature_date
      in: query
      description: Конечное значение диапазона фильтрации документов по дате подписания.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/DATE
    eq__legal_act_type_id:
      name: eq__legal_act_type_id
      in: query
      description: ID типа документа.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    authority_id:
      name: authority_id
      in: query
      description: ID типа органа власти.
      deprecated: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    eq__authority_id:
      name: eq__authority_id
      in: query
      description: ID типа органа власти.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    authority_name_id:
      name: authority_name_id
      in: query
      description: ID названия органа.
      deprecated: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    eq__authority_name_id:
      name: eq__authority_name_id
      in: query
      description: ID названия органа.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    territory_id:
      name: territory_id
      in: query
      description: ID территории.
      deprecated: true
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    eq__territory_id:
      name: eq__territory_id
      in: query
      description: ID территории.
      schema:
        $ref: fields.openapi.yaml#/components/schemas/ID
    name:
      name: name
      in: query
      description: Имя записи из правочника.
      schema:
        type: string
        minLength: 1
        maxLength: 200
        nullable: false
    eq__name:
      name: eq__name
      in: query
      description: Имя записи из правочника.
      schema:
        type: string
        minLength: 1
        maxLength: 200
        nullable: false
    value:
      name: value
      in: query
      description: Имя записи из справочника.
      schema:
        type: string
        minLength: 1
        maxLength: 200
        nullable: false
    number:
      name: number
      in: query
      description: Номер документа.
      deprecated: true
      schema:
        type: string
        minLength: 1
        maxLength: 20
        nullable: false
    eq__number:
      name: eq__number
      in: query
      description: Номер документа.
      schema:
        type: string
        minLength: 1
        maxLength: 20
        nullable: false
