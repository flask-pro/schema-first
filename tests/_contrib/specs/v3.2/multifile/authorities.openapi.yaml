authorities:
  post:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: create_authority
    summary: Создаёт орган власти
    requestBody:
      $ref: '#/components/requestBodies/RequestCreateAuthority'
    responses:
      '201':
        $ref: '#/components/responses/ResponseAuthority'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  get:
    parameters:
    - $ref: parameters.openapi.yaml#/components/parameters/include_metadata
    - $ref: parameters.openapi.yaml#/components/parameters/page
    - $ref: parameters.openapi.yaml#/components/parameters/per_page
    - $ref: parameters.openapi.yaml#/components/parameters/eq__id
    tags:
    - directories
    operationId: read_authorities
    summary: Возвращает список органов власти
    responses:
      '200':
        $ref: '#/components/responses/Authorities'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  patch:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: update_authority
    summary: Редактирование органа власти
    requestBody:
      $ref: '#/components/requestBodies/RequestUpdateAuthority'
    responses:
      '200':
        $ref: '#/components/responses/ResponseAuthority'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  delete:
    security:
    - bearerAuth: []
    tags:
    - directories
    operationId: delete_authority
    summary: Удаляет орган власти.
    requestBody:
      $ref: openapi.yaml#/components/requestBodies/DeleteObject
    responses:
      '204':
        $ref: openapi.yaml#/components/responses/EmptyBody
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    NewAuthority:
      type: object
      additionalProperties: false
      required:
      - name
      - genitive_name
      - short_name
      properties:
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    Authority:
      type: object
      additionalProperties: false
      required: [id, name, genitive_name, short_name]
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
        short_name:
          $ref: fields.openapi.yaml#/components/schemas/SHORT_NAME
    UpdatedAuthority:
      type: object
      additionalProperties: false
      required:
      - id
      properties:
        id:
          $ref: fields.openapi.yaml#/components/schemas/ID
        name:
          $ref: fields.openapi.yaml#/components/schemas/NAME
        genitive_name:
          $ref: fields.openapi.yaml#/components/schemas/GENITIVE_NAME
  responses:
    ResponseAuthority:
      description: Схема ответа содержащая данные органа власти.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Authority'
    Authorities:
      description: Список органов власти.
      content:
        application/json:
          schema:
            additionalProperties: false
            type: object
            required:
            - items
            properties:
              _metadata:
                $ref: openapi.yaml#/components/schemas/Metadata
              items:
                type: array
                items:
                  $ref: '#/components/schemas/Authority'
  requestBodies:
    RequestCreateAuthority:
      description: Запрос создания нового органа власти.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NewAuthority'
    RequestUpdateAuthority:
      description: Запрос изменения органа власти.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UpdatedAuthority'
