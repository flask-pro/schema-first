resolvers-fragment:
  post:
    tags:
    - resolvers
    operationId: fragment_analyze
    summary: Анализ текстa
    requestBody:
      $ref: '#/components/requestBodies/NewAnalyzeRequest'
    responses:
      '201':
        $ref: '#/components/responses/NewAnalyzeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
resolvers-file:
  post:
    security:
    - bearerAuth: []
    tags:
    - resolvers
    operationId: file_analyze
    summary: Анализирует файл
    requestBody:
      content:
        multipart/form-data:
          schema:
            additionalProperties: false
            type: object
            required:
            - file
            properties:
              file:
                type: string
                format: binary
                nullable: false
                minLength: 1
    responses:
      '201':
        $ref: '#/components/responses/NewFileAnalyzeResponse'
      default:
        $ref: openapi.yaml#/components/responses/CommonError
  options:
    $ref: CORS.openapi.yaml#/CORS
components:
  schemas:
    TEXT:
      type: string
      minLength: 15
      maxLength: 1000
      example: Текст для анализа.
      description: Текст, который будет отправлен в сервис выявления коррупциогенных факторов.
    NAME:
      description: Метка фактора, которым был классифицирован текст.
      type: string
      nullable: true
      example: Широта дискреционных полномочий
      enum:
      - Широта дискреционных полномочий
      - Определение компетенции по формуле "вправе"
      - Выборочное изменение объема прав
      - Чрезмерная свобода подзаконного нормотворчества
      - Принятие нормативного правового акта за пределами компетенции
      - Заполнение законодательных пробелов при помощи подзаконных актов в отсутствие законодательной делегации соответствующих полномочий
      - Отсутствие или неполнота административных процедур
      - Отказ от конкурсных (аукционных) процедур
      - Нормативные коллизии
      - Наличие завышенных требований к лицу, предъявляемых для реализации принадлежащего ему права
      - Злоупотребление правом заявителя государственными органами, органами местного самоуправления или организациями (их должностными лицами)
      - Юридико-лингвистическая неопределенность
    METHOD:
      description: Метод анализа.
      type: string
      nullable: false
      example: heuristics
      enum: [heuristics, model_v1.1, model_v2]
    AnalyzeData:
      type: object
      additionalProperties: false
      required:
      - text
      properties:
        text:
          $ref: '#/components/schemas/TEXT'
    Result:
      additionalProperties: false
      type: object
      required:
      - name
      - method
      properties:
        name:
          $ref: '#/components/schemas/NAME'
        method:
          $ref: '#/components/schemas/METHOD'
    AnalysisResult:
      type: object
      additionalProperties: false
      required:
      - text
      properties:
        text:
          $ref: '#/components/schemas/TEXT'
        results:
          type: array
          items:
            $ref: '#/components/schemas/Result'
    AnalysisResults:
      type: array
      items:
        $ref: '#/components/schemas/AnalysisResult'
  responses:
    NewAnalyzeResponse:
      description: Классифицированный текст.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnalysisResult'
    NewFileAnalyzeResponse:
      description: Найденные факторы в файле.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnalysisResults'
  requestBodies:
    NewAnalyzeRequest:
      description: Текст для отправки в сервисы выявления коррупциогенных факторов.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/AnalyzeData'
